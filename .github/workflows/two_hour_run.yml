name: Two-Hour RSS Feed Update
on:
  schedule:
    # Run every 30 minutes (at :00 and :30 of each hour)
    - cron: '0,30 * * * *'
  workflow_dispatch:  # Allow manual triggering
  
# Add permissions needed to commit and push
permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4        # ← updated from v3 (Node 20 → Node 24 compatible)
      
    - name: Set up Python
      uses: actions/setup-python@v5    # ← updated from v4 (Node 20 → Node 24 compatible)
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create output directory
      run: mkdir -p output
        
    - name: Run RSS feed generator
      run: python ark_full_feed.py
        
    - name: Debug - List files
      run: |
        echo "Current directory:"
        ls -la
        echo "Output directory:"
        ls -la output/ || echo "Output directory not found or empty"
      
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "Update RSS feed - $(date)" || echo "No changes to commit"
        git push
